name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: macos-15
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run codecheck

      - name: Test
        run: pnpm run test

      - name: Bootstrap first-release baseline
        # If no version tags exist yet, anchor v0.0.0 at the parent of HEAD so
        # semantic-release treats the current push as the first releasable change
        # and creates v0.0.1 (patch) or higher on this very run.
        run: |
          if ! git tag --list 'v*.*.*' | grep -qE '^v[0-9]'; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            PARENT=$(git rev-parse --verify HEAD^ 2>/dev/null || git rev-parse HEAD)
            git tag v0.0.0 "$PARENT"
            git push origin v0.0.0
            git fetch --tags
          fi

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: pnpm exec semantic-release
